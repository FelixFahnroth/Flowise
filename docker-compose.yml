version: '3.8'

services:
  flowise:
    image: flowiseai/flowise:latest
    container_name: flowise_migration
    restart: always
    environment:
      - PORT=3000
      - FLOWISE_USERNAME=admin
      - FLOWISE_PASSWORD=dein_passwort_hier
      - DATABASE_PATH=/root/.flowise
      - APIROOT=/root/.flowise
    # Port 3000 direkt auf dem Server öffnen, um den Proxy zu umgehen
    ports:
      - "3000:3000"
    volumes:
      - /opt/flowise/data:/root/.flowise
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
