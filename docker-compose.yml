services:
  flowise:
    image: flowiseai/flowise:latest
    restart: always
    environment:
      - PORT=4141
      - FLOWISE_USERNAME=${FLOWISE_ADMIN_USER}
      - FLOWISE_PASSWORD=${FLOWISE_ADMIN_PASSWORD}
      - DATABASE_PATH=/root/.flowise
      - APIROOT=/root/.flowise
    # DIE PORTS SEKTION WURDE ENTFERNT -> ZUGRIFF NUR NOCH ÜBER PROXY
    volumes:
      - /opt/flowise/data:/root/.flowise
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
