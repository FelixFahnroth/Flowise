version: '3.8'

services:
  flowise:
    image: flowiseai/flowise:latest
    restart: always
    environment:
      - PORT=3000
      #- FLOWISE_USERNAME=${FLOWISE_ADMIN_USER}
      #- FLOWISE_PASSWORD=${FLOWISE_ADMIN_PASSWORD}
      # Diese Variablen stellen sicher, dass Flowise im gemounteten Ordner arbeitet
      - DATABASE_PATH=/root/.flowise
      - APIROOT=/root/.flowise
      - LOG_PATH=/root/.flowise/logs
      - BLOB_STORAGE_PATH=/root/.flowise/storage
    volumes:
      # Wir verbinden dein 2.5GB Verzeichnis direkt mit dem Flowise-Container
      - /opt/flowise/data:/root/.flowise
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
